<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE SCAN</title>
    <style>
        /* White background for face illumination */
        body { 
            background: #ffffff; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .terminal-box { 
            width: 280px; 
            height: 400px; 
            background: #000000; 
            border-radius: 25px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* The Scan Line */
        .scanner-line { 
            position: absolute; 
            width: 100%; 
            height: 3px; 
            background: #00ff41; 
            box-shadow: 0 0 15px #00ff41;
            top: 0; 
            animation: move 2.5s infinite linear; 
        }

        @keyframes move {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .status-container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        #status-msg {
            color: #00ff41;
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Success Icon - hidden until verified */
        #success-icon {
            display: none;
            width: 60px;
            height: 60px;
            border: 3px solid #00ff41;
            border-radius: 50%;
            margin-bottom: 20px;
            position: relative;
        }

        #success-icon::after {
            content: '✓';
            color: #00ff41;
            font-size: 40px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Hidden Camera */
        video { display: none; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px; font-weight: bold; color: #333;">BIOMETRIC ACCESS CONTROL</div>

    <div class="terminal-box">
        <video id="webcam" autoplay playsinline></video>
        <div id="line" class="scanner-line"></div>
        
        <div class="status-container">
            <div id="success-icon"></div>
            <div id="status-msg">ANALYZING BIOMETRICS...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const statusMsg = document.getElementById('status-msg');
        const line = document.getElementById('line');
        const icon = document.getElementById('success-icon');
        let verified = false;

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => video.srcObject = s);

        async function process() {
            if (verified) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const image = canvas.toDataURL('image/jpeg', 0.5);

            try {
                const res = await fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image })
                });
                const data = await res.json();

                if (data.authenticated) {
                    verified = true;
                    statusMsg.innerText = "VERIFICATION COMPLETED";
                    line.style.display = 'none';
                    icon.style.display = 'block';
                    document.querySelector('.terminal-box').

style.borderColor = "#00ff41";
                } else {
                    statusMsg.innerText = "SCANNING FOR HUMAN...";
                }
            } catch (e) {
                statusMsg.innerText = "SENSOR OFFLINE";
            }
        }

        setInterval(process, 1200);
    </script>
</body>
</html>
