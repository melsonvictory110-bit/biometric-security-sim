<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOMETRIC AUTHENTICATOR</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --alert-red: #ff0000;
        }

        /* White background acts as a ring-light for your face */
        body {
            background-color: #ffffff; 
            color: #000;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .phone-container {
            width: 320px;
            height: 580px;
            border: 8px solid #111;
            border-radius: 40px;
            position: relative;
            background: #000;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .scan-line {
            position: absolute;
            top: 0;
            width: 100%;
            height: 4px;
            background: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
            z-index: 5;
            animation: moveScan 2.5s infinite ease-in-out;
        }

        @keyframes moveScan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .status-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--neon-green);
            padding: 12px;
            text-align: center;
            border-radius: 4px;
        }

        #status-text {
            color: var(--neon-green);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div style="margin-bottom: 10px; font-weight: bold;">SECURITY TERMINAL </div>

    <div class="phone-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="scanner" class="scan-line"></div>
        
        <div class="status-panel">
            <div id="status-text" class="blink">SCANNING BIOMETRICS...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status-text');
        const scanLine = document.getElementById('scanner');
        const container = document.querySelector('.phone-container');
        let isVerified = false;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { statusText.innerText = "CAMERA ERROR"; });

        async function performScan() {
            if (isVerified) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg', 0.5);

            try {
                const response = await fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });
                
                const data = await response.json();
                statusText.innerText = data.status;

                if (data.authenticated) {
                    isVerified = true;
                    statusText.style.color = "#00ff41";
                    statusText.classList.remove('blink');

scanLine.style.display = 'none'; // Stop scanning line
                    container.style.borderColor = "#00ff41";
                    container.style.boxShadow = "0 0 40px rgba(0, 255, 65, 0.4)";
                } else {
                    statusText.style.color = "#ff0000";
                }
            } catch (error) {
                statusText.innerText = "LINK ERROR";
            }
        }

        setInterval(performScan, 1000);
    </script>
</body>
</html>
