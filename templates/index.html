<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Biometric Security Sim</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .monitor-frame {
            border: 4px solid #00ff00;
            padding: 10px;
            background: #000;
            box-shadow: 0 0 20px #00ff00;
            position: relative;
        }

        .camera-feed {
            width: 640px;
            height: 480px;
            display: block;
            border: 1px solid #333;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 0, 0.6);
            box-shadow: 0 0 10px #00ff00;
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .overlay-text {
            margin-top: 20px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ff00;
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h1>SECURITY TERMINAL v1.0</h1>
    
    <div class="monitor-frame">
        <div class="scan-line"></div>
        <img src="{{ url_for('video_feed') }}" class="camera-feed">
    </div>

    <div class="overlay-text">
        <p>STATUS: <span class="blink">SCANNING BIOMETRICS...</span></p>
    </div>

</body>
</html>
