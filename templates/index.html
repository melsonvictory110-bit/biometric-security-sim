<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOMETRIC AUTHENTICATOR</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --alert-red: #ff0000;
        }

        /* The white background helps reflect light onto your face */
        body {
            background-color: #ffffff; 
            color: #000;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header-text {
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .phone-container {
            width: 320px;
            height: 580px;
            border: 8px solid #111;
            border-radius: 40px;
            position: relative;
            background: #000;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            filter: contrast(110%);
        }

        .scan-line {
            position: absolute;
            top: 0;
            width: 100%;
            height: 3px;
            background: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
            z-index: 5;
            animation: moveScan 2.5s infinite ease-in-out;
        }

        @keyframes moveScan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .status-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--neon-green);
            padding: 12px;
            text-align: center;
            border-radius: 4px;
        }

        #status-text {
            color: var(--neon-green);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header-text">SYSTEM IDENTIFICATION v2.0</div>

    <div class="phone-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="scan-line"></div>
        
        <div class="status-panel">
            <div style="font-size: 0.6rem; color: #888; margin-bottom: 4px;">BIOMETRIC STATUS:</div>
            <div id="status-text" class="blink">WAITING FOR SENSOR...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status-text');

        // Access Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { statusText.innerText = "CAMERA BLOCKED"; });

        async function performScan() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            const base64Image = canvas.toDataURL('image/jpeg', 0.5); // 0.5 compresses for faster speed

            try {
                const response = await fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });
                
                const data = await response.json();
                statusText.innerText = data.status;

                if (data.authenticated) {
                    statusText.style.

color = "#00ff41";
                    statusText.classList.remove('blink');
                    // Add a glow to the container if successful
                    document.querySelector('.phone-container').style.borderColor = "#00ff41";
                } else {
                    statusText.style.color = "#ff0000";
                    statusText.classList.add('blink');
                    document.querySelector('.phone-container').style.borderColor = "#111";
                }
            } catch (error) {
                statusText.innerText = "LINK ERROR";
            }
        }

        // Run the scan every 1 second
        setInterval(performScan, 1000);
    </script>
</body>
</html>
