<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE SCAN</title>
    <style>
        /* White background for face illumination */
        body { 
            background: #ffffff; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .terminal-box { 
            width: 300px; 
            height: 500px; 
            background: #000000; 
            border: 4px solid #111;
            border-radius: 35px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* Visible Camera Feed */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.7; /* Slight transparency for the "hacker" look */
        }

        /* The Scan Line */
        .scanner-line { 
            position: absolute; 
            width: 100%; 
            height: 4px; 
            background: #00ff41; 
            box-shadow: 0 0 20px #00ff41;
            top: 0; 
            z-index: 10;
            animation: move 3s infinite ease-in-out; 
        }

        @keyframes move {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .status-overlay {
            position: absolute;
            bottom: 30px;
            width: 85%;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ff41;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        #status-msg {
            color: #00ff41;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .success-glow {
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.5) !important;
            border-color: #00ff41 !important;
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px; font-weight: bold; color: #111; letter-spacing: 1px;">BIOMETRIC AUTHENTICATION</div>

    <div class="terminal-box" id="main-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="line" class="scanner-line"></div>
        
        <div class="status-overlay">
            <div id="status-msg" class="blink">SCANNING BIOMETRICS...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const statusMsg = document.getElementById('status-msg');
        const line = document.getElementById('line');
        const container = document.getElementById('main-container');
        let verified = false;

        // Access the front camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => { video.srcObject = s; })
            .catch(err => { statusMsg.innerText = "CAMERA ERROR"; });

        async function process() {
            if (verified) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const image = canvas.toDataURL('image/jpeg', 0.5);

            try {
                const res = await fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image })
                });
                const data = await res.json();

if (data.authenticated) {
                    verified = true;
                    statusMsg.innerText = "VERIFICATION COMPLETED";
                    statusMsg.classList.remove('blink');
                    line.style.display = 'none';
                    container.classList.add('success-glow');
                } else {
                    statusMsg.innerText = "IDENTIFYING SUBJECT...";
                }
            } catch (e) {
                statusMsg.innerText = "SERVER OFFLINE";
            }
        }

        // Run detection every 1.5 seconds
        setInterval(process, 1500);
    </script>
</body>
</html>
