<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Security Terminal</title>
    <style>
        body { 
            background-color: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #container { 
            border: 4px solid #0f0; 
            padding: 10px; 
            position: relative;
            background: rgba(0, 50, 0, 0.2);
            box-shadow: 0 0 20px #0f0;
        }
        video { 
            transform: scaleX(-1); 
            width: 640px; 
            height: 480px; 
            border: 1px solid #0f0;
        }
        #status { 
            font-size: 28px; 
            margin-top: 20px; 
            font-weight: bold;
            text-shadow: 2px 2px #000;
        }
        canvas { display: none; }
    </style>
</head>
<body>
    <h1>SECURITY TERMINAL v2.0</h1>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="status">INITIALIZING SCAN...</div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        // Request access to the user's webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { 
                video.srcObject = stream; 
            })
            .catch(err => { 
                status.innerText = "ERROR: CAMERA ACCESS DENIED";
                status.style.color = "#f00";
            });

        // Send a frame to the server every 500ms for processing
        setInterval(() => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Convert the image to a small JPEG to save bandwidth
                const data = canvas.toDataURL('image/jpeg', 0.5);

                fetch('/process_frame', {
                    method: 'POST',
                    body: JSON.stringify({ image: data }),
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(res => res.json())
                .then(data => {
                    status.innerText = data.status;
                    // Switch color based on authentication status
                    if (data.authenticated) {
                        status.style.color = "#0f0"; // Green
                    } else {
                        status.style.color = "#f00"; // Red
                    }
                })
                .catch(err => console.error("Server connection error:", err));
            }
        }, 500);
    </script>
</body>
</html>
